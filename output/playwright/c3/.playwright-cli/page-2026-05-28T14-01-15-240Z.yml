    - heading "How the game works" [level=2] [ref=e22]
    - list [ref=e23]:
      - listitem [ref=e24]:
        - text: Each round, a payoff matrix is sampled and a prediction is proposed, e.g.
        - code [ref=e25]: R>=*
        - text: or
        - code [ref=e26]: P>R
        - text: ":"
    - code [ref=e28]: "? -2 -3 -1 -3 +3 +1 0 -1"
    - list [ref=e29]:
      - listitem [ref=e30]: You have 5s to opt in and agree or disagree with the prediction, or abstain.
      - listitem [ref=e31]: You can broadcast your intentions publicly if you wish.
      - listitem [ref=e32]: You play simultaneously against all other opponents.
    - heading "How to do well and score points" [level=2] [ref=e33]
    - list [ref=e34]:
      - listitem [ref=e35]: "Use LLM agents (codex) extensively: to write code, brainstorm, analyse data, etc. A good starting point is to feed the game documentation and URL to codex."
      - listitem [ref=e36]: "Leverage teamwork: strategise together, split tasks, share codebase effectively (e.g. git repo)."
      - listitem [ref=e37]: Make sure you switch from individual game token to team token by the end of Stage 2.
      - listitem [ref=e38]: "Score points in play: use the best action given the payoff matrix and your opponents. +5 for opt-in."
      - listitem [ref=e39]: "Score points by betting: chip in 15 when entering the pot; losers forfeit pot to winners. Know when to bet & which side to pick."
      - listitem [ref=e40]: "Avoid penalties: make sure you are online if you opt in. A missed action costs −1 per opponent."